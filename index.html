<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MacroBase</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#0a0a0a; --surface:#111; --surface2:#161616; --surface3:#1e1e1e;
  --border:#282828; --border2:#353535; --border3:#404040;
  --text:#f0ede8; --text2:#aaa9a2; --text3:#777770; --text4:#555550;
  --accent:#e8d5a0; --accent2:#c4a96e; --accent3:#8a6e3a;
  --cal:#ff6b35; --pro:#4ecdc4; --fat:#ffe66d; --carb:#a8e6cf; --fib:#c3b1e1; --sug:#ff9eb5;
  --radius:0px;
  --trans:all 0.22s cubic-bezier(0.16,1,0.3,1);
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── CANVAS BG ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.6}

/* ── GRID OVERLAY ── */
.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(232,213,160,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(232,213,160,0.025) 1px,transparent 1px);
  background-size:64px 64px;
  animation:gridPulse 8s ease-in-out infinite;
}
@keyframes gridPulse{0%,100%{opacity:0.6}50%{opacity:1}}

/* ── NOISE ── */
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
}

.wrapper{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 24px}

/* ══════════════════════════════════
   HEADER
══════════════════════════════════ */
header{
  padding:56px 0 36px;
  border-bottom:1px solid var(--border2);
  margin-bottom:44px;
  position:relative;
}

.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}

.logo-block{overflow:hidden}
.logo-eyebrow{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.35em;
  color:var(--accent2);text-transform:uppercase;margin-bottom:8px;
  animation:fadeSlideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
.logo-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(56px,9vw,96px);
  line-height:0.88;letter-spacing:0.02em;
  animation:fadeSlideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s both;
}
.logo-title .accent{color:var(--accent)}
.logo-sub{
  font-size:13px;color:var(--text3);margin-top:12px;font-weight:300;
  font-family:'DM Mono',monospace;letter-spacing:0.05em;
  animation:fadeSlideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s both;
}

/* ── HEADER RIGHT ── */
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:20px;flex-shrink:0}

.header-counter{
  text-align:right;
  animation:fadeSlideDown 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both;
}
.counter-num{
  font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--accent);line-height:1;
  display:block;
}
.counter-label{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.25em;
  color:var(--text3);text-transform:uppercase;
}

/* ── LANGUAGE TOGGLE ── */
.lang-toggle{
  display:flex;align-items:center;gap:2px;
  background:var(--surface);border:1px solid var(--border2);
  padding:3px;position:relative;
  animation:fadeSlideDown 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s both;
}
.lang-btn{
  background:none;border:none;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.12em;
  color:var(--text3);text-transform:uppercase;
  padding:8px 16px;cursor:pointer;
  position:relative;z-index:2;
  transition:color 0.25s;
}
.lang-btn.active{color:var(--bg)}
.lang-slider{
  position:absolute;top:3px;left:3px;bottom:3px;
  background:var(--accent);
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1),width 0.3s cubic-bezier(0.16,1,0.3,1);
  z-index:1;
  width:calc(50% - 3px);
}
.lang-toggle[data-lang="ro"] .lang-slider{transform:translateX(calc(100% + 0px))}

@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── TICKER LINE ── */
.ticker-line{
  position:relative;overflow:hidden;height:28px;
  border-top:1px solid var(--border);
  margin-top:20px;
  animation:fadeIn 1s 0.5s both;
}
.ticker-inner{
  display:flex;gap:0;white-space:nowrap;
  animation:tickerScroll 60s linear infinite;
  height:100%;align-items:center;
}
.ticker-inner:hover{animation-play-state:paused}
.ticker-item{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;
  color:var(--text3);text-transform:uppercase;
  padding:0 24px;border-right:1px solid var(--border2);height:100%;
  display:flex;align-items:center;
  transition:color 0.2s;
}
.ticker-item:hover{color:var(--accent2)}
@keyframes tickerScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══════════════════════════════════
   SEARCH
══════════════════════════════════ */
.search-section{
  margin-bottom:36px;
  animation:fadeSlideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s both;
}

.search-wrap{position:relative;display:flex;align-items:center}

.search-icon{
  position:absolute;left:20px;
  font-size:20px;color:var(--text4);pointer-events:none;
  font-family:'DM Mono',monospace;
  transition:color 0.25s,transform 0.25s;
}
.search-wrap:focus-within .search-icon{
  color:var(--accent2);transform:scale(1.1);
}

#searchInput{
  width:100%;background:var(--surface);
  border:1px solid var(--border2);
  color:var(--text);font-family:'DM Sans',sans-serif;
  font-size:18px;font-weight:300;
  padding:20px 20px 20px 52px;
  outline:none;
  transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;
  -webkit-appearance:none;
}
#searchInput::placeholder{color:var(--text4)}
#searchInput:focus{
  border-color:var(--accent2);
  box-shadow:0 0 0 1px var(--accent2),0 8px 40px rgba(196,169,110,0.08);
  background:var(--surface2);
}

/* animated underline */
.search-underline{
  height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--pro));
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);
  margin-top:-1px;
}
.search-wrap:focus-within ~ .search-underline{transform:scaleX(1)}

.search-clear{
  position:absolute;right:18px;background:none;border:none;
  color:var(--text3);cursor:pointer;
  width:28px;height:28px;display:none;
  align-items:center;justify-content:center;font-size:18px;
  transition:color 0.2s,transform 0.2s,opacity 0.2s;
  opacity:0;
}
.search-clear.visible{display:flex;opacity:1}
.search-clear:hover{color:var(--text);transform:rotate(90deg)}

/* ── FILTERS ── */
.filters{
  display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;
}

.chip{
  background:var(--surface2);
  border:1px solid var(--border3);
  color:var(--text2);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.12em;
  text-transform:uppercase;padding:8px 14px;cursor:pointer;
  transition:all 0.2s cubic-bezier(0.16,1,0.3,1);
  position:relative;overflow:hidden;white-space:nowrap;
}
.chip::before{
  content:'';position:absolute;inset:0;
  background:var(--chip-color,var(--accent));
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.25s cubic-bezier(0.16,1,0.3,1);
  opacity:0.15;
}
/* left accent stripe using chip color */
.chip::after{
  content:'';position:absolute;top:0;left:0;bottom:0;
  width:2px;background:var(--chip-color,var(--accent2));
  opacity:0;transition:opacity 0.2s;
}
.chip:hover{
  border-color:var(--text2);color:var(--text);
  background:var(--surface3);
}
.chip:hover::before{transform:scaleX(1)}
.chip:hover::after{opacity:1}
.chip.active{
  background:var(--accent);border-color:var(--accent);
  color:var(--bg);font-weight:500;
}
.chip.active::before,.chip.active::after{display:none}

/* ══════════════════════════════════
   RESULTS META
══════════════════════════════════ */
.results-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
  animation:fadeIn 0.6s 0.5s both;
}
.results-count{
  font-family:'DM Mono',monospace;font-size:11px;
  letter-spacing:0.15em;color:var(--text3);text-transform:uppercase;
}
.results-count span{color:var(--accent);transition:all 0.3s}

.sort-wrap{display:flex;gap:4px;align-items:center}
.sort-label{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);
  letter-spacing:0.12em;text-transform:uppercase;margin-right:4px;
}
.sort-btn{
  background:var(--surface2);border:1px solid var(--border2);color:var(--text3);
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;
  text-transform:uppercase;padding:6px 10px;cursor:pointer;
  transition:all 0.2s;
}
.sort-btn:hover{border-color:var(--text2);color:var(--text2);background:var(--surface3)}
.sort-btn.active{border-color:var(--accent2);color:var(--accent);background:var(--surface3)}

/* ══════════════════════════════════
   GRID & CARDS
══════════════════════════════════ */
#resultsGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:2px;margin-bottom:80px;
}

.card{
  background:var(--surface);border:1px solid var(--border);
  padding:26px;cursor:pointer;
  transition:background 0.2s,border-color 0.2s,transform 0.3s cubic-bezier(0.16,1,0.3,1),box-shadow 0.3s;
  position:relative;overflow:hidden;
  will-change:transform;
}

/* shimmer on hover */
.card::after{
  content:'';position:absolute;
  top:-100%;left:-60%;
  width:40%;height:300%;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.03) 50%,transparent 60%);
  transition:transform 0.6s;
  pointer-events:none;
}
.card:hover::after{transform:translateX(400%)}

/* top accent bar */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--cat-color,var(--accent2));
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.35s cubic-bezier(0.16,1,0.3,1);
}
.card:hover{
  background:var(--surface2);border-color:var(--border3);
  transform:translateY(-3px) scale(1.005);
  box-shadow:0 12px 48px rgba(0,0,0,0.5),0 0 0 1px var(--border2);
  z-index:2;
}
.card:hover::before{transform:scaleX(1)}

/* stagger-in animation */
.card{
  animation:cardReveal 0.45s cubic-bezier(0.16,1,0.3,1) both;
}
@keyframes cardReveal{
  from{opacity:0;transform:translateY(16px) scale(0.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.card-cat{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.22em;
  color:var(--cat-color,var(--accent2));text-transform:uppercase;
  margin-bottom:10px;opacity:1;
}
.card-name{
  font-size:15px;font-weight:500;color:var(--text);
  line-height:1.3;margin-bottom:3px;
  transition:color 0.2s;
}
.card:hover .card-name{color:var(--accent)}
.card-name-ro{
  font-size:10px;color:var(--text3);font-style:italic;
  margin-bottom:18px;font-family:'DM Mono',monospace;
  min-height:14px;
  transition:color 0.2s;
}
.card:hover .card-name-ro{color:var(--text2)}

.card-kcal-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
.card-kcal{
  font-family:'Bebas Neue',sans-serif;font-size:40px;
  color:var(--cal);line-height:1;
  transition:transform 0.2s;
}
.card:hover .card-kcal{transform:scale(1.04)}
.card-kcal-unit{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.15em;
}
.card-kcal-label{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.18em;
  color:var(--text3);text-transform:uppercase;margin-bottom:18px;
}

/* MACRO BARS */
.macro-bars{display:flex;flex-direction:column;gap:8px}
.macro-row{display:grid;grid-template-columns:58px 1fr 42px;align-items:center;gap:10px}
.macro-label{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.1em;
  color:var(--text3);text-transform:uppercase;
}
.macro-bar-track{
  height:3px;background:var(--border3);overflow:hidden;position:relative;
}
.macro-bar-fill{
  height:100%;background:var(--bar-color);
  transform-origin:left;transform:scaleX(0);
  transition:transform 0.7s cubic-bezier(0.16,1,0.3,1);
  transition-delay:var(--bar-delay,0s);
}
.card.in-view .macro-bar-fill{transform:scaleX(1)}
.macro-val{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text2);text-align:right;
}

/* ══════════════════════════════════
   EMPTY STATE
══════════════════════════════════ */
.empty-state{
  grid-column:1/-1;padding:100px 20px;text-align:center;
  animation:fadeIn 0.5s both;
}
.empty-icon{
  font-family:'Bebas Neue',sans-serif;font-size:100px;
  color:var(--border2);line-height:1;margin-bottom:20px;
  letter-spacing:0.05em;
}
.empty-text{
  font-family:'DM Mono',monospace;font-size:12px;
  color:var(--text4);letter-spacing:0.18em;text-transform:uppercase;
}

/* ══════════════════════════════════
   MODAL
══════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0);backdrop-filter:blur(0px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
  pointer-events:none;
  transition:background 0.3s,backdrop-filter 0.3s;
}
.modal-overlay.open{
  background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);pointer-events:all;
}

.modal{
  background:var(--surface);border:1px solid var(--border2);
  max-width:580px;width:100%;max-height:92vh;overflow-y:auto;
  position:relative;
  transform:translateY(32px) scale(0.94);opacity:0;
  transition:transform 0.4s cubic-bezier(0.16,1,0.3,1),opacity 0.3s;
}
.modal-overlay.open .modal{transform:translateY(0) scale(1);opacity:1}

/* modal inner scroll */
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-track{background:transparent}
.modal::-webkit-scrollbar-thumb{background:var(--border2)}

/* ── MODAL HEADER BG ── */
.modal-hero{
  position:relative;padding:36px 36px 0;
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  overflow:hidden;
}
.modal-hero-glow{
  position:absolute;top:-40px;right:-40px;
  width:240px;height:240px;border-radius:50%;
  background:var(--cat-color,var(--accent2));
  opacity:0.07;filter:blur(60px);
  pointer-events:none;
  animation:glowPulse 3s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:0.05;transform:scale(1)}50%{opacity:0.1;transform:scale(1.1)}}

.modal-close{
  position:absolute;top:18px;right:18px;
  background:none;border:1px solid var(--border2);
  color:var(--text3);width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
  transition:all 0.2s;z-index:2;
}
.modal-close:hover{border-color:var(--text2);color:var(--text);background:var(--surface3);transform:rotate(90deg)}

.modal-cat{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.28em;
  color:var(--cat-color,var(--accent2));text-transform:uppercase;
  margin-bottom:10px;
  animation:fadeSlideDown 0.4s 0.05s both;
}
.modal-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(40px,7vw,64px);line-height:0.92;
  margin-bottom:8px;
  animation:fadeSlideUp 0.45s 0.08s both;
}
.modal-name-ro{
  font-size:13px;color:var(--text3);font-style:italic;
  font-family:'DM Mono',monospace;margin-bottom:28px;
  min-height:18px;
  animation:fadeSlideUp 0.45s 0.12s both;
}

/* ── MODAL KCAL BADGE ── */
.modal-kcal-bar{
  display:flex;align-items:flex-end;gap:16px;padding-bottom:28px;
  animation:fadeSlideUp 0.45s 0.15s both;
}
.modal-kcal-num{
  font-family:'Bebas Neue',sans-serif;font-size:88px;
  color:var(--cal);line-height:0.85;
  position:relative;
}
.modal-kcal-num::after{
  content:'';position:absolute;
  bottom:4px;left:0;right:0;height:3px;
  background:var(--cal);opacity:0.3;
}
.modal-kcal-meta{padding-bottom:8px}
.modal-kcal-unit{
  font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.2em;
  color:var(--text3);text-transform:uppercase;display:block;margin-bottom:4px;
}
.modal-kcal-per{font-size:11px;color:var(--text4);font-family:'DM Mono',monospace}

/* ── MODAL BODY ── */
.modal-body{padding:28px 36px 36px}

/* DONUT + LEGEND */
.macro-visual{
  display:flex;align-items:center;gap:28px;
  margin-bottom:20px;padding:22px;
  background:var(--surface2);border:1px solid var(--border);
  animation:fadeSlideUp 0.5s 0.2s both;
}
.chart-wrap{flex-shrink:0;position:relative;width:120px;height:120px}
.chart-wrap svg{transform:rotate(-90deg);display:block}
.chart-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.chart-c-num{
  font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--cal);line-height:1;
}
.chart-c-lbl{
  font-family:'DM Mono',monospace;font-size:8px;color:var(--text4);
  letter-spacing:0.1em;text-transform:uppercase;
}

.macro-legend{flex:1;display:flex;flex-direction:column;gap:10px}
.legend-row{
  display:flex;align-items:center;gap:10px;
  padding:4px 0;
  border-bottom:1px solid var(--border2);
}
.legend-row:last-child{border-bottom:none}
.legend-dot{width:8px;height:8px;flex-shrink:0;border-radius:1px}
.legend-name{
  font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);
  flex:1;text-transform:uppercase;letter-spacing:0.1em;
}
.legend-g{font-family:'DM Mono',monospace;font-size:10px;color:var(--text)}
.legend-pct{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);
  width:34px;text-align:right;
}

/* MACRO TILES */
.tiles-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:2px;
  animation:fadeSlideUp 0.5s 0.25s both;
}
.tiles-grid-3{
  display:grid;grid-template-columns:1fr 1fr;gap:2px;
  animation:fadeSlideUp 0.5s 0.3s both;
}
.macro-tile{
  background:var(--surface2);padding:20px 22px;border:1px solid var(--border);
  position:relative;overflow:hidden;
}
.macro-tile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--tile-color);
  transform:scaleX(0);transform-origin:left;
  animation:tileLine 0.8s cubic-bezier(0.16,1,0.3,1) var(--td,0s) both;
}
@keyframes tileLine{from{transform:scaleX(0)}to{transform:scaleX(1)}}

.macro-tile::after{
  content:'';position:absolute;bottom:-20px;right:-10px;
  width:80px;height:80px;border-radius:50%;
  background:var(--tile-color);opacity:0.04;
  transition:opacity 0.3s,transform 0.3s;
}
.macro-tile:hover::after{opacity:0.08;transform:scale(1.3)}

.tile-label{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;
  color:var(--text3);text-transform:uppercase;margin-bottom:10px;
}
.tile-val{
  font-family:'Bebas Neue',sans-serif;font-size:42px;
  color:var(--tile-color);line-height:1;
}
.tile-unit{
  font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);
}
.tile-pct{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text3);margin-top:8px;
}

/* ── MACRO PROGRESS BARS ── */
.macro-progress{
  margin-top:20px;padding:20px 22px;
  background:var(--surface2);border:1px solid var(--border2);
  animation:fadeSlideUp 0.5s 0.35s both;
}
.progress-title{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;
  color:var(--text3);text-transform:uppercase;margin-bottom:16px;
}
.prog-row{
  display:grid;grid-template-columns:80px 1fr 50px;
  align-items:center;gap:12px;margin-bottom:12px;
}
.prog-row:last-child{margin-bottom:0}
.prog-label{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.1em;
}
.prog-track{height:6px;background:var(--border3);position:relative;overflow:hidden}
.prog-fill{
  height:100%;background:linear-gradient(90deg,var(--prog-color) 0%,var(--prog-color2,var(--prog-color)) 100%);
  transform:scaleX(0);transform-origin:left;
  animation:progGrow 1s cubic-bezier(0.16,1,0.3,1) var(--pd,0s) both;
}
@keyframes progGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
.prog-val{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--text2);text-align:right;
}

/* ══════════════════════════════════
   SCROLLBAR
══════════════════════════════════ */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2)}

/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */
@media(max-width:620px){
  header{padding:36px 0 28px}
  .header-top{flex-direction:column;gap:16px}
  .header-right{flex-direction:row;align-items:center;justify-content:space-between;width:100%}
  .modal-hero{padding:24px 20px 0}
  .modal-body{padding:20px 20px 28px}
  .modal-kcal-num{font-size:64px}
  .tiles-grid,.tiles-grid-3{grid-template-columns:1fr 1fr}
}

// STATE

let lang = 'en';

// ═══════════════════════════════════════
// CANVAS BACKGROUND
// ═══════════════════════════════════════
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let W, H;

function resizeCanvas() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initParticles() {
  particles = Array.from({length:40}, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.5 + 0.3,
    vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15,
    alpha: Math.random()*0.3+0.05,
    color: Math.random()>0.6 ? '#e8d5a0' : '#4ecdc4',
  }));
}

function drawParticles() {
  ctx.clearRect(0,0,W,H);
  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = p.color + Math.floor(p.alpha*255).toString(16).padStart(2,'0');
    ctx.fill();
    p.x += p.vx; p.y += p.vy;
    if(p.x<0) p.x=W; if(p.x>W) p.x=0;
    if(p.y<0) p.y=H; if(p.y>H) p.y=0;
  });
  requestAnimationFrame(drawParticles);
}

resizeCanvas(); initParticles(); drawParticles();
window.addEventListener('resize', ()=>{ resizeCanvas(); initParticles(); });

// TICKER

function buildTicker() {
  const sample = DB.filter((_,i)=>i%22===0).map(d => lang==='en' ? d.n : d.r);
  const inner = document.getElementById('tickerInner');
  const doubled = [...sample,...sample];
  inner.innerHTML = doubled.map(n=>`<span class="ticker-item">${n}</span>`).join('');
}

// ═══════════════════════════════════════
// FILTER CHIPS
// ═══════════════════════════════════════
const filterChips = document.getElementById('filterChips');
const categories = [...new Set(DB.map(d=>d.c))].sort();

function buildChips() {
  filterChips.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeCategory===null?' active':'');
  allChip.setAttribute('data-en','All');
  allChip.setAttribute('data-ro','Toate');
  allChip.textContent = lang==='en'?'All':'Toate';
  allChip.addEventListener('click',()=>{ activeCategory=null; render(); });
  filterChips.appendChild(allChip);

  categories.forEach(cat=>{
    const chip = document.createElement('button');
    chip.className='chip'+(activeCategory===cat?' active':'');
    const roName = DB.find(d=>d.c===cat)?.cr || cat;
    chip.setAttribute('data-en', cat);
    chip.setAttribute('data-ro', roName);
    chip.textContent = lang==='en' ? cat : roName;
    chip.style.setProperty('--chip-color', CAT_COLORS[cat]||'#888');
    chip.addEventListener('click',()=>{
      activeCategory = activeCategory===cat ? null : cat;
      render();
    });
    filterChips.appendChild(chip);
  });
}

// ═══════════════════════════════════════
const langToggle = document.getElementById('langToggle');
document.querySelectorAll('[data-lang-btn]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    lang = btn.dataset.langBtn;
    langToggle.dataset.lang = lang;
    document.querySelectorAll('[data-lang-btn]').forEach(b=>b.classList.toggle('active',b.dataset.langBtn===lang));
    applyLang();
    buildTicker();
    render();
  });
});

function applyLang() {
  // Static labels
  document.querySelectorAll('[data-en]').forEach(el=>{
    if(el.tagName==='INPUT') {
      el.placeholder = el.getAttribute(`data-placeholder-${lang}`) || el.getAttribute('data-en');
    } else if(!el.closest('.chip') && !el.closest('.sort-btn')) {
      el.textContent = el.getAttribute(`data-${lang}`);
    }
  });
  // Search placeholder
  const si = document.getElementById('searchInput');
  si.placeholder = si.getAttribute(`data-placeholder-${lang}`);
  // Sort buttons
  document.querySelectorAll('.sort-btn').forEach(b=>{
    if(b.dataset[lang]) b.textContent = b.dataset[lang];
  });
  // Rebuild chips with translated names
  buildChips();
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

// Strip diacritics: ș→s, ț→t, î→i, â→a, ă→a, etc.
function norm(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

// Pre-compute normalized search fields once at startup
DB.forEach(d=>{
  d._sn = norm(d.n);
  d._sr = norm(d.r);
  d._sc = norm(d.c);
  d._scr = norm(d.cr||'');
});

searchInput.addEventListener('input',()=>{
  query = norm(searchInput.value.trim());
  clearBtn.classList.toggle('visible', query.length>0);
  render();
});
clearBtn.addEventListener('click',()=>{
  searchInput.value=''; query='';
  clearBtn.classList.remove('visible');
  render(); searchInput.focus();
});

// ═══════════════════════════════════════
// FILTER + SORT
// ═══════════════════════════════════════
function getFiltered() {
  let res = DB;
  if(activeCategory) res=res.filter(d=>d.c===activeCategory);
  if(query) res=res.filter(d=>
    d._sn.includes(query)||
    d._sr.includes(query)||
    d._sc.includes(query)||
    d._scr.includes(query)
  );
  res=[...res];
  if(sortBy==='name') res.sort((a,b)=>{
    const an=lang==='en'?a.n:a.r, bn=lang==='en'?b.n:b.r;
    return an.localeCompare(bn);
  });
  else if(sortBy==='kcal') res.sort((a,b)=>b.k-a.k);
  else if(sortBy==='protein') res.sort((a,b)=>b.p-a.p);
  else if(sortBy==='fat') res.sort((a,b)=>b.f-a.f);
  else if(sortBy==='carbs') res.sort((a,b)=>b.b-a.b);
  return res;
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
const grid = document.getElementById('resultsGrid');
const L = ()=>MACRO_LABELS[lang];

// IntersectionObserver for bar animations
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in-view'); });
},{threshold:0.1});

function render() {
  filtered = getFiltered();
  const cnt = filtered.length;

  // Update count
  document.getElementById('countNum').textContent = cnt.toLocaleString();

  if(cnt===0) {
    grid.innerHTML=`<div class="empty-state">
      <div class="empty-icon">∅</div>
      <div class="empty-text">${lang==='en'?'No ingredients found — try a different search':'Niciun ingredient găsit — încearcă altceva'}</div>
    </div>`;
    return;
  }

  const toShow = filtered.slice(0,200);
  const frag = document.createDocumentFragment();

  toShow.forEach((item,i)=>{
    const col=CAT_COLORS[item.c]||'#888';
    const mx=Math.max(item.p,item.f,item.b,1);
    const name = lang==='en' ? item.n : item.r;
    const nameAlt = lang==='en' ? item.r : item.n;
    const catName = lang==='en' ? item.c : (item.cr||item.c);
    const delay = Math.min(i*0.018,0.35);

    const card = document.createElement('div');
    card.className='card';
    card.style.cssText=`--cat-color:${col};animation-delay:${delay}s`;
    card.innerHTML=`
      <div class="card-cat">${catName}</div>
      <div class="card-name">${name}</div>
      <div class="card-name-ro">${nameAlt!==name?nameAlt:'&nbsp;'}</div>
      <div class="card-kcal-row">
        <div class="card-kcal">${item.k}</div>
        <span class="card-kcal-unit">kcal</span>
      </div>
      <div class="card-kcal-label">${lang==='en'?'per 100g':'per 100g'}</div>
      <div class="macro-bars">
        ${mBar(L().protein, item.p, mx, '#4ecdc4', 0.08)}
        ${mBar(L().fat,     item.f, mx, '#ffe66d', 0.14)}
        ${mBar(L().carbs,   item.b, mx, '#a8e6cf', 0.20)}
        ${mBar(L().fiber,   item.i, mx, '#c3b1e1', 0.26)}
      </div>`;
    card.addEventListener('click',()=>openModal(DB.indexOf(item)));
    observer.observe(card);
    frag.appendChild(card);
  });

  grid.innerHTML='';
  grid.appendChild(frag);

  if(filtered.length>200){
    const more=document.createElement('div');
    more.style.cssText='grid-column:1/-1;text-align:center;padding:28px;font-family:DM Mono,monospace;font-size:10px;color:var(--text4);letter-spacing:.18em;text-transform:uppercase';
    more.textContent=`+ ${(filtered.length-200).toLocaleString()} ${lang==='en'?'more — refine your search':'mai multe — restrânge căutarea'}`;
    grid.appendChild(more);
  }
}

function mBar(label,val,max,color,delay) {
  const w=Math.min(Math.max(val/max*100,0),100);
  return `<div class="macro-row">
    <span class="macro-label">${label}</span>
    <div class="macro-bar-track">
      <div class="macro-bar-fill" style="--bar-color:${color};width:${w}%;--bar-delay:${delay}s"></div>
    </div>
    <span class="macro-val">${val}g</span>
  </div>`;
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
const modalOverlay = document.getElementById('modalOverlay');
const modalClose   = document.getElementById('modalClose');

// Animated number counter
function animateNum(el, target, duration=600) {
  const start = performance.now();
  const from = parseFloat(el.textContent)||0;
  function step(now) {
    const t = Math.min((now-start)/duration,1);
    const ease = 1-Math.pow(1-t,3);
    el.textContent = Math.round(from+(target-from)*ease);
    if(t<1) requestAnimationFrame(step);
    else el.textContent = target;
  }
  requestAnimationFrame(step);
}

function openModal(idx) {
  const item = DB[idx];
  const col = CAT_COLORS[item.c]||'#888';
  const l = L();
  const name = lang==='en' ? item.n : item.r;
  const nameAlt = lang==='en' ? item.r : item.n;
  const catName = lang==='en' ? item.c : (item.cr||item.c);

  document.getElementById('mGlow').style.background=col;
  document.getElementById('mCat').textContent=catName;
  document.getElementById('mCat').style.setProperty('--cat-color',col);
  document.getElementById('mName').textContent=name;
  document.getElementById('mNameRo').textContent=nameAlt!==name?nameAlt:'';

  // Animate kcal
  const mKcal = document.getElementById('mKcal');
  const chartKcal = document.getElementById('chartKcal');
  mKcal.textContent='0';
  chartKcal.textContent='0';

  modalOverlay.classList.add('open');
  document.body.style.overflow='hidden';

  requestAnimationFrame(()=>{
    animateNum(mKcal, item.k, 700);
    animateNum(chartKcal, item.k, 700);
  });

  // Donut arcs
  const circ=2*Math.PI*50;
  const total=item.p*4+item.f*9+item.b*4;
  const arcP=document.getElementById('arcP');
  const arcF=document.getElementById('arcF');
  const arcC=document.getElementById('arcC');

  [arcP,arcF,arcC].forEach(a=>{
    a.style.transition='none';
    a.style.strokeDasharray='0 '+circ;
    a.style.strokeDashoffset='0';
  });

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      let off=0;
      function arc(el,val,kcalPer){
        const frac=total>0?(val*kcalPer)/total:0;
        const dash=frac*circ;
        el.style.transition='stroke-dasharray 1s cubic-bezier(0.16,1,0.3,1)';
        el.style.strokeDasharray=`${dash} ${circ-dash}`;
        el.style.strokeDashoffset=String(-off);
        off+=dash;
      }
      arc(arcP,item.p,4);
      arc(arcF,item.f,9);
      arc(arcC,item.b,4);
    });
  });

  // Legend
  const macros=[
    {key:l.protein, val:item.p, kcalPer:4, color:'#4ecdc4'},
    {key:l.fat,     val:item.f, kcalPer:9, color:'#ffe66d'},
    {key:l.carbs,   val:item.b, kcalPer:4, color:'#a8e6cf'},
    {key:l.fiber,   val:item.i, kcalPer:2, color:'#c3b1e1'},
    {key:l.sugar,   val:item.s, kcalPer:4, color:'#ff9eb5'},
  ];
  document.getElementById('macroLegend').innerHTML=macros.map(m=>{
    const pct=total>0?Math.round(m.val*m.kcalPer/total*100):0;
    return `<div class="legend-row">
      <div class="legend-dot" style="background:${m.color}"></div>
      <span class="legend-name">${m.key}</span>
      <span class="legend-g">${m.val}g</span>
      <span class="legend-pct">${pct}%</span>
    </div>`;
  }).join('');

  // Tiles
  const t=[
    {label:l.protein,val:item.p,color:'#4ecdc4',td:'0s'},
    {label:l.fat,    val:item.f,color:'#ffe66d',td:'0.08s'},
  ];
  const tb=[
    {label:l.carbs,val:item.b,color:'#a8e6cf',td:'0.16s'},
    {label:l.fiber, val:item.i,color:'#c3b1e1',td:'0.24s'},
  ];
  const makeTile=x=>`<div class="macro-tile" style="--tile-color:${x.color};--td:${x.td}">
    <div class="tile-label">${x.label}</div>
    <div class="tile-val" style="color:${x.color}">${x.val}<span class="tile-unit"> g</span></div>
    <div class="tile-pct">${l.per100}</div>
  </div>`;

  document.getElementById('tilesTop').innerHTML=t.map(makeTile).join('');
  document.getElementById('tilesBottom').innerHTML=tb.map(makeTile).join('');

  // Progress bars
  document.querySelector('.progress-title').textContent=l.breakdown;
  const progressMax=Math.max(item.p,item.f,item.b,item.i,1);
  const bars=[
    {label:l.protein,val:item.p,max:progressMax,c:'#4ecdc4',c2:'#4ecdc4',pd:'0.1s'},
    {label:l.fat,    val:item.f,max:progressMax,c:'#ffe66d',c2:'#fdcb6e',pd:'0.2s'},
    {label:l.carbs,  val:item.b,max:progressMax,c:'#a8e6cf',c2:'#55efc4',pd:'0.3s'},
    {label:l.fiber,  val:item.i,max:progressMax,c:'#c3b1e1',c2:'#dda0dd',pd:'0.4s'},
    {label:l.sugar,  val:item.s,max:progressMax,c:'#ff9eb5',c2:'#ff7675',pd:'0.5s'},
  ];
  document.getElementById('progressBars').innerHTML=bars.map(b=>{
    const w=Math.min(b.val/b.max*100,100);
    return `<div class="prog-row">
      <span class="prog-label">${b.label}</span>
      <div class="prog-track">
        <div class="prog-fill" style="--prog-color:${b.c};--prog-color2:${b.c2};width:${w}%;--pd:${b.pd}"></div>
      </div>
      <span class="prog-val">${b.val}g</span>
    </div>`;
  }).join('');

  // Scroll modal to top
  document.getElementById('modalCard').scrollTop=0;
}

function closeModal() {
  modalOverlay.classList.remove('open');
  document.body.style.overflow='';
}

modalClose.addEventListener('click',closeModal);
modalOverlay.addEventListener('click',e=>{ if(e.target===modalOverlay)closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
buildChips();
buildTicker();
render();
</script>
